<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rihla — Pocket Travel Planner</title>
</head>
<body>
<style>
  :root{
    --paper:#e9e2cf; --paper2:#f2ecd9; --card:#fbf8ef;
    --ink:#211e17; --muted:#7d7562; --line:#d9cfb6;
    --teal:#0c4a41; --teal-soft:#0c4a4112;
    --amber:#c6842a; --amber-soft:#c6842a1f;
    --clay:#b0512f;
    --shadow:0 14px 34px rgba(40,32,20,.14);
    --ff-display:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --ff-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --ff-data:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#0a1310; --paper2:#0f1a15; --card:#14211c;
      --ink:#ece5d3; --muted:#93a096; --line:#243029;
      --teal:#45b8a1; --teal-soft:#45b8a11a;
      --amber:#e6a648; --amber-soft:#e6a64822;
      --clay:#d9694c; --shadow:0 16px 40px rgba(0,0,0,.5);
    }
  }
  :root[data-theme="light"]{
    --paper:#e9e2cf; --paper2:#f2ecd9; --card:#fbf8ef;
    --ink:#211e17; --muted:#7d7562; --line:#d9cfb6;
    --teal:#0c4a41; --teal-soft:#0c4a4112; --amber:#c6842a; --amber-soft:#c6842a1f;
    --clay:#b0512f; --shadow:0 14px 34px rgba(40,32,20,.14);
  }
  :root[data-theme="dark"]{
    --paper:#0a1310; --paper2:#0f1a15; --card:#14211c;
    --ink:#ece5d3; --muted:#93a096; --line:#243029;
    --teal:#45b8a1; --teal-soft:#45b8a11a; --amber:#e6a648; --amber-soft:#e6a64822;
    --clay:#d9694c; --shadow:0 16px 40px rgba(0,0,0,.5);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:var(--ff-body);color:var(--ink);line-height:1.5;background:var(--paper);min-height:100vh}
  #topo{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
  .wrap{max-width:680px;margin:0 auto;padding:20px 18px 64px;position:relative;z-index:1}

  .langbar{display:flex;justify-content:center;gap:6px;margin-bottom:8px}
  .lang{padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:13px;cursor:pointer;user-select:none;transition:all .15s}
  .lang.active{background:var(--ink);border-color:var(--ink);color:var(--paper);font-weight:600}

  .hero{text-align:center;padding:6px 4px 2px}
  .compass{width:60px;height:60px;margin:0 auto 6px;border-radius:50%;border:2px solid var(--teal);position:relative;background:var(--card);box-shadow:var(--shadow)}
  .compass::before{content:"";position:absolute;inset:0;margin:auto;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:22px solid var(--amber);transform:translateY(-3px) rotate(38deg);transform-origin:50% 70%}
  .compass::after{content:"";position:absolute;inset:0;margin:auto;width:6px;height:6px;border-radius:50%;background:var(--teal)}
  h1{font-family:var(--ff-display);font-size:38px;margin:2px 0 0;letter-spacing:.5px;font-weight:600}
  .tag{color:var(--muted);font-size:15px;max-width:420px;margin:6px auto 0;text-wrap:balance}
  .eyebrow{font-family:var(--ff-data);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--amber);font-weight:600}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:20px;margin-top:22px;position:relative}
  .card::before{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:44px;height:6px;border-radius:0 0 8px 8px;background:var(--paper);border:1px solid var(--line);border-top:none}
  label{display:block;font-family:var(--ff-data);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 7px;font-weight:600}
  label:first-of-type{margin-top:0}
  .hint{text-transform:none;letter-spacing:0;font-weight:400}
  input,select{width:100%;padding:14px;border-radius:11px;border:1px solid var(--line);background:var(--paper2);color:var(--ink);font-size:16px;font-family:var(--ff-body);outline:none;transition:border-color .15s}
  input:focus,select:focus{border-color:var(--teal)}
  #dest,#dest2{margin-top:10px}
  .addcity{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:9px 15px;border-radius:999px;border:1px dashed var(--line);background:transparent;color:var(--teal);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--ff-body);transition:all .15s}
  .addcity:hover{border-color:var(--teal);background:var(--teal-soft)}
  .is-hidden{display:none!important}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
  .chip{padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--paper2);color:var(--muted);font-size:14px;cursor:pointer;user-select:none;transition:all .15s}
  .chip:hover{border-color:var(--teal)}
  .chip.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}
  @media (prefers-color-scheme:dark){.chip.active{color:#0a1310}}
  :root[data-theme="dark"] .chip.active{color:#0a1310}
  :root[data-theme="light"] .chip.active{color:#fff}

  .btn{width:100%;margin-top:22px;padding:16px;border:none;border-radius:12px;background:var(--amber);color:#231a0a;font-size:16px;font-weight:700;font-family:var(--ff-body);cursor:pointer;box-shadow:var(--shadow);letter-spacing:.3px;transition:transform .08s,filter .15s}
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:3px solid var(--teal);outline-offset:2px}

  .out{margin-top:28px;display:none}
  .out.show{display:block;animation:rise .45s ease}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.out.show{animation:none}}
  .ticket{background:var(--teal);color:#fdfaf1;border-radius:16px;padding:20px}
  .ticket .eyebrow{color:#e9d6a8}
  .ticket h2{font-family:var(--ff-display);font-size:25px;margin:4px 0 2px;font-weight:600;line-height:1.15}
  .ticket .sub{opacity:.85;font-size:14px}
  .ticket .blurb{font-size:13.5px;opacity:.92;margin-top:10px;font-style:italic;text-wrap:balance}
  .ticket .season{display:inline-block;margin-top:11px;font-size:12.5px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);padding:5px 11px;border-radius:999px;font-variant-numeric:tabular-nums}
  .ticket a{color:#fff;text-decoration:underline;text-decoration-color:#e9d6a8;text-underline-offset:2px}
  .stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  .stat{flex:1;min-width:120px;background:rgba(255,255,255,.1);border-radius:10px;padding:11px 13px}
  .stat .k{font-family:var(--ff-data);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;opacity:.75}
  .stat .v{font-size:15px;font-weight:700;margin-top:3px}
  .stat .v.num{font-variant-numeric:tabular-nums}
  .realtag{font-family:var(--ff-data);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 2px 4px;text-align:center}

  .route{margin-top:6px;padding-left:4px}
  .day{position:relative;padding:18px 0 4px 26px;margin-left:8px;border-left:2px solid var(--line)}
  .day:last-child{border-left-color:transparent}
  .day::before{content:"";position:absolute;left:-7px;top:22px;width:12px;height:12px;border-radius:50%;background:var(--amber);border:2px solid var(--card)}
  .day .dlabel{font-family:var(--ff-data);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);font-weight:600}
  .day h3{font-family:var(--ff-display);margin:1px 0 10px;font-size:19px;font-weight:600}
  .slot{display:flex;gap:11px;padding:8px 0;border-top:1px dashed var(--line)}
  .slot:first-of-type{border-top:none}
  .slot .ico{font-size:18px;width:24px;text-align:center;flex-shrink:0}
  .slot .t{font-family:var(--ff-data);font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);width:64px;flex-shrink:0;padding-top:3px}
  .slot .d{font-size:15px}
  .slot .d a{color:inherit;text-decoration:underline;text-decoration-color:var(--amber);text-underline-offset:3px}
  .slot .area{color:var(--muted);font-size:12.5px}
  .note{color:var(--muted);font-size:12.5px;text-align:center;margin-top:22px;padding:0 8px;text-wrap:balance}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:34px;line-height:1.6}
  .foot b{color:var(--ink)}

  .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .act{flex:1;min-width:92px;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--ff-body);transition:all .15s}
  .act:hover{border-color:var(--teal)}
  .act:active{transform:translateY(1px)}
  .bud{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;margin-top:16px}
  .bud h4{font-family:var(--ff-display);font-size:17px;margin:0 0 10px;font-weight:600}
  .budrow{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-top:1px dashed var(--line);font-size:14px}
  .budrow:first-of-type{border-top:none}
  .budrow .amt{font-variant-numeric:tabular-nums;color:var(--muted)}
  .budrow.total{border-top:2px solid var(--line);margin-top:4px;font-weight:700}
  .budrow.total .amt{color:var(--ink)}
  .budnote{font-size:11.5px;color:var(--muted);margin-top:8px}
  .transfer{background:var(--paper2);border:1px dashed var(--clay);border-radius:12px;padding:12px 14px;margin:14px 0 4px}
  .transfer .tlabel{font-family:var(--ff-data);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--clay);font-weight:600}
  .transfer .tbody{font-size:14px;margin-top:3px}
  .mapcard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-top:16px}
  .maphdr{font-family:var(--ff-data);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  #app[dir="rtl"] .maphdr{letter-spacing:normal;font-family:var(--ff-body)}
  .mapcv{width:100%;height:150px;display:block;border-radius:10px;background:var(--paper2)}
  .mapbtn{display:block;text-align:center;margin-top:12px;padding:12px;border-radius:11px;background:var(--teal);color:#fff;font-weight:700;text-decoration:none;font-size:14px;transition:filter .15s}
  @media(prefers-color-scheme:dark){.mapbtn{color:#0a1310}}
  :root[data-theme="dark"] .mapbtn{color:#0a1310}
  :root[data-theme="light"] .mapbtn{color:#fff}
  .mapbtn:hover{filter:brightness(1.06)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;z-index:5}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media print{
    #topo,.langbar,.hero,.card,.foot,.actions{display:none!important}
    body,.wrap{background:#fff;color:#000}
    .out{margin:0}
    .ticket{background:#0c4a41!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }

  #app[dir="rtl"]{text-align:right}
  #app[dir="rtl"] .hero,#app[dir="rtl"] .langbar,#app[dir="rtl"] .note,#app[dir="rtl"] .foot,#app[dir="rtl"] .realtag{text-align:center}
  #app[dir="rtl"] .eyebrow,#app[dir="rtl"] label,#app[dir="rtl"] .dlabel,#app[dir="rtl"] .slot .t,#app[dir="rtl"] .stat .k{letter-spacing:normal;text-transform:none;font-family:var(--ff-body)}
  #app[dir="rtl"] .day{border-left:none;border-right:2px solid var(--line);margin-left:0;margin-right:8px;padding-left:0;padding-right:26px}
  #app[dir="rtl"] .day:last-child{border-right-color:transparent}
  #app[dir="rtl"] .day::before{left:auto;right:-7px}
  #app[dir="rtl"] .route{padding-left:0;padding-right:4px}
</style>

<canvas id="topo" aria-hidden="true"></canvas>

<div class="wrap" id="app" dir="ltr">
  <div class="langbar" id="langbar">
    <div class="lang active" data-lang="en">English</div>
    <div class="lang" data-lang="ar">العربية</div>
    <div class="lang" data-lang="es">Español</div>
  </div>

  <header class="hero">
    <div class="compass" aria-hidden="true"></div>
    <div class="eyebrow" id="heroEyebrow">Pocket travel planner</div>
    <h1>Rihla</h1>
    <p class="tag" id="heroTag">Tell me where and when — I'll map out your days in seconds.</p>
  </header>

  <div class="card">
    <label for="destPick" id="lblDest">Where to?</label>
    <select id="destPick"></select>
    <input id="dest" type="text" placeholder="…or type any other place" autocomplete="off">

    <button type="button" class="addcity" id="addCity">+ <span id="addCityLabel">Add a second city</span></button>
    <div id="city2wrap" class="is-hidden">
      <label for="destPick2" id="lblDest2">Second city</label>
      <select id="destPick2"></select>
      <input id="dest2" type="text" placeholder="…or type a second city" autocomplete="off">
    </div>

    <div class="row">
      <div><label for="days" id="lblDays">How many days?</label><input id="days" type="number" min="1" max="30" value="5"></div>
      <div><label for="pace" id="lblPace">Trip pace</label>
        <select id="pace"><option value="relaxed">Relaxed</option><option value="balanced" selected>Balanced</option><option value="packed">Packed</option></select>
      </div>
    </div>

    <label id="lblBudget">Budget</label>
    <div class="chips" id="budgetChips">
      <div class="chip" data-v="Budget"></div>
      <div class="chip active" data-v="Mid-range"></div>
      <div class="chip" data-v="Luxury"></div>
    </div>

    <label id="lblVibe">What are you into?</label>
    <div class="chips" id="vibeChips">
      <div class="chip active" data-v="Culture"></div>
      <div class="chip" data-v="Food"></div>
      <div class="chip" data-v="Nature"></div>
      <div class="chip" data-v="Shopping"></div>
      <div class="chip" data-v="Relax"></div>
    </div>

    <button class="btn" id="planBtn" type="button">Plan my trip →</button>
  </div>

  <div class="out" id="out" aria-live="polite"></div>
  <p class="foot" id="foot"></p>
</div>
<div class="toast" id="toast" aria-hidden="true"></div>

      var fo=match.food[f++%match.food.length];
      html+=slot('',o.times.dinner,link(fo.n,fo.n+' '+match.city)+' <span class="area">· '+esc(fo.a)+'</span>');
      txt.push('  '+o.times.dinner+': '+fo.n+' ('+fo.a+')');
      html+='</div>';
    }
    return html;
  }

  var MAPQ=[], MAPN=0;
  function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
  function routeUrl(city,stops){
    if(stops.length<=1)return mapUrl((stops[0]?stops[0].n:city)+' '+city);
    var q=stops.map(function(s){return encodeURIComponent(s.n+' '+city);});
    var u='https://www.google.com/maps/dir/?api=1&origin='+q[0]+'&destination='+q[q.length-1];
    var way=q.slice(1,-1).join('|'); if(way)u+='&waypoints='+way;
    return u;
  }
  function mapCard(city,stops,t){
    var seen={},uniq=[]; stops.forEach(function(s){if(!seen[s.n]){seen[s.n]=1;uniq.push(s);}});
    if(!uniq.length)return '';
    var id='mapcv_'+(MAPN++); MAPQ.push({id:id,n:Math.min(uniq.length,12)});
    var url=routeUrl(city,uniq.slice(0,10));
    return '<div class="mapcard"><div class="maphdr">'+t.out.mapTitle+' · '+esc(city)+'</div>'+
      '<canvas class="mapcv" id="'+id+'"></canvas>'+
      '<a class="mapbtn" href="'+url+'" target="_blank" rel="noopener">'+t.out.openMap+'</a></div>';
  }
  function drawMiniMap(cv,n){
    var w=cv.clientWidth||300,h=150,dpr=Math.min(2,window.devicePixelRatio||1),ctx=cv.getContext('2d');
    cv.width=w*dpr; cv.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    var teal=cssVar('--teal'),amber=cssVar('--amber'),ink=cssVar('--ink'),card=cssVar('--card');
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle=ink; ctx.globalAlpha=0.05; ctx.lineWidth=1;
    for(var r=18;r<170;r+=22){ctx.beginPath();ctx.arc(w*0.5,h*0.5,r,0,Math.PI*2);ctx.stroke();}
    ctx.globalAlpha=1;
    var pad=28,pts=[];
    for(var i=0;i<n;i++){var x=pad+(n===1?(w-2*pad)/2:i*(w-2*pad)/(n-1));var y=h*0.5+Math.sin(i*0.9+0.6)*h*0.24;pts.push([x,y]);}
    ctx.strokeStyle=teal; ctx.globalAlpha=0.55; ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath(); pts.forEach(function(p,i){i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]);}); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;
    pts.forEach(function(p,i){
      ctx.beginPath(); ctx.arc(p[0],p[1],11,0,Math.PI*2); ctx.fillStyle=amber; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle=card; ctx.stroke();
      ctx.fillStyle='#231a0a'; ctx.font='bold 11px ui-monospace,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(i+1),p[0],p[1]);
    });
  }
  function redrawMaps(){MAPQ.forEach(function(q){var cv=$(q.id);if(cv)drawMiniMap(cv,q.n);});}

  function budgetCard(o,t,rows,transferUSD,totalUSD,localKey){
    var h='<div class="bud"><h4>'+o.budTitle+'</h4>';
    rows.forEach(function(r){h+='<div class="budrow"><span>'+o.cats[r.k]+'</span><span class="amt">'+money(t,r.v)+'</span></div>';});
    if(transferUSD>0)h+='<div class="budrow"><span>'+o.cats.transfer+'</span><span class="amt">'+money(t,transferUSD)+'</span></div>';
    h+='<div class="budrow total"><span>'+o.budTotal+' · '+o.perPerson+'</span><span class="amt">'+money(t,totalUSD);
    if(localKey&&CUR[localKey]&&CUR[localKey].s!=='$'){var cu=CUR[localKey];h+=' <span style="opacity:.65">('+o.inLocal+' '+cu.s+Math.round(totalUSD*cu.r).toLocaleString(t.loc)+')</span>';}
    h+='</span></div><div class="budnote">'+o.exclFlights+'</div></div>';
    return h;
  }

  var LASTTEXT='';

  function plan(){
    var t=I18N[LANG],o=t.out;
    var raw=($('dest').value||'').trim();
    var days=Math.max(1,Math.min(30,parseInt($('days').value,10)||5));
    var pace=$('pace').value, spd=pace==='relaxed'?2:pace==='packed'?4:3;
    var budget=picked('budgetChips')[0]||'Mid-range';
    var vibes=picked('vibeChips'); if(!vibes.length)vibes=['Culture'];
    var subVibes=vibes.map(function(v){return t.ui.vibes[v];}).join(' · ');
    var m1=matchDest(raw);
    var raw2=($('dest2').value||'').trim();
    var m2=raw2?matchDest(raw2):($('destPick2').value?DEST[$('destPick2').value]:null);
    if(m2&&m2===m1)m2=null;
    var txt=[], html='', note=''; MAPQ=[];

    if(m1){
      var multi=!!(m2&&days>=2);
      var d1=multi?Math.ceil(days/2):days, d2=multi?days-d1:0;
      var base1=m1.cost[budget]*d1, base2=multi?m2.cost[budget]*d2:0;
      var tr=multi?transferInfo(t,m1,m2):null, trUSD=tr?tr.usd:0;
      var totalUSD=base1+base2+trUSD;
      var title=multi?(esc(m1.city)+' → '+esc(m2.city)+' · '+days+' '+o.daysUnit):(esc(m1.city)+', '+esc(m1.country)+' · '+days+' '+o.daysUnit);
      var stay=multi?(link(m1.hotels[budget],m1.hotels[budget]+' '+m1.city)+' / '+link(m2.hotels[budget],m2.hotels[budget]+' '+m2.city)):(link(m1.hotels[budget],m1.hotels[budget]+' '+m1.city)+' · <a href="'+bookUrl(m1.hotels[budget]+' '+m1.city)+'" target="_blank" rel="noopener">'+o.book+'</a>');
      var seasons='<div class="season">'+seasonLine(m1,t)+'</div>'+(multi?' <div class="season">'+seasonLine(m2,t)+'</div>':'');
      var blurb=multi?(esc(m1.city)+' ('+d1+' '+o.daysUnit+') → '+esc(m2.city)+' ('+d2+' '+o.daysUnit+')'):esc(m1.blurb[LANG]);

      txt.push(multi?(m1.city+' → '+m2.city+' · '+days+' '+o.daysUnit):(m1.city+', '+m1.country+' · '+days+' '+o.daysUnit));
      txt.push(t.ui.budgets[budget]+' · '+t.ui.paces[pace]+' · '+subVibes);

      html+='<div class="ticket"><div class="eyebrow">'+o.eyebrow+'</div>'+
        '<h2>'+title+'</h2>'+
        '<div class="sub">'+t.ui.budgets[budget]+' · '+t.ui.paces[pace]+' · '+subVibes+'</div>'+
        '<div class="blurb">'+blurb+'</div>'+seasons+
        '<div class="stats">'+
          '<div class="stat"><div class="k">'+o.statLen+'</div><div class="v num">'+days+' '+o.daysUnit+'</div></div>'+
          '<div class="stat"><div class="k">'+o.statStay+'</div><div class="v">'+stay+'</div></div>'+
          '<div class="stat"><div class="k">'+o.statPer+'</div><div class="v num">'+money(t,totalUSD)+'</div></div>'+
        '</div></div>';

      var stops1=[], route1=emitDays(m1,1,d1,days,vibes,spd,o,t,txt,stops1);
      var mapHtml=mapCard(m1.city,stops1,t), route2='', transHtml='';
      if(multi){
        transHtml='<div class="transfer"><div class="tlabel">'+o.cats.transfer+'</div><div class="tbody">'+tr.mode+' · '+esc(m1.city)+' → '+esc(m2.city)+' · '+tr.dur+' · '+money(t,tr.usd)+'</div></div>';
        txt.push(''); txt.push('» '+o.cats.transfer+': '+m1.city+' → '+m2.city+' ('+tr.dur+', ~$'+tr.usd+')');
        var stops2=[]; route2=emitDays(m2,d1+1,d2,days,vibes,spd,o,t,txt,stops2);
        mapHtml+=mapCard(m2.city,stops2,t);
      }
      html+=mapHtml;
      html+='<div class="realtag">'+o.realTag+'</div><div class="route">'+route1+transHtml+route2+'</div>';
      html+=budgetCard(o,t,catRows(base1+base2),trUSD,totalUSD,multi?null:keyOf(m1));
      txt.push(''); txt.push(o.budTotal+' ('+o.perPerson+'): ~$'+Math.round(totalUSD));
      note=o.note(esc(m1.city)+(multi?' & '+esc(m2.city):''));
    } else {
      var dest=raw||(LANG==='ar'?'وجهتك':LANG==='es'?'tu destino':'your destination');
      var gbase=GENCOST[budget]*days;
      txt.push(cap(dest)+' · '+days+' '+o.daysUnit); txt.push(t.ui.budgets[budget]+' · '+t.ui.paces[pace]+' · '+subVibes);
      html+='<div class="ticket"><div class="eyebrow">'+o.eyebrow+'</div>'+
        '<h2>'+esc(cap(dest))+' · '+days+' '+o.daysUnit+'</h2>'+
        '<div class="sub">'+t.ui.budgets[budget]+' · '+t.ui.paces[pace]+' · '+subVibes+'</div>'+
        '<div class="stats">'+
          '<div class="stat"><div class="k">'+o.statLen+'</div><div class="v num">'+days+' '+o.daysUnit+'</div></div>'+
          '<div class="stat"><div class="k">'+o.statStay+'</div><div class="v">'+t.hotels[budget]+'</div></div>'+
          '<div class="stat"><div class="k">'+o.statPer+'</div><div class="v num">'+money(t,gbase)+'</div></div>'+
        '</div></div><div class="route">';
      var tl2=timeLabels(o,spd);
      for(var d3=1;d3<=days;d3++){
        var tt=d3===1?o.arrival:d3===days?o.last:o.explore;
        html+='<div class="day"><div class="dlabel">'+o.dayWord+' '+d3+'</div><h3>'+tt+'</h3>';
        txt.push(''); txt.push(o.dayWord+' '+d3+' — '+tt);
        for(var s3=0;s3<spd;s3++){var vb=vibes[(d3+s3)%vibes.length];var act=pick(t.lib[vb],d3+s3);html+=slot('',tl2[s3],esc(act[1]));txt.push('  '+tl2[s3]+': '+act[1]);}
        html+=slot('',o.times.dinner,o.dinner_(pick(t.meals[budget],d3)));
        html+='</div>';
      }
      html+='</div>';
      html+=budgetCard(o,t,catRows(gbase),0,gbase,null);
      note='<span style="color:var(--clay)">'+o.notCurated(esc(cap(dest)))+'</span><br>'+o.note(esc(cap(dest)));
    }

    html+='<p class="note">'+note+'</p>';
    html+='<div class="actions"><button class="act" type="button" data-act="copy">'+o.copy+'</button><button class="act" type="button" data-act="share">'+o.share+'</button><button class="act" type="button" data-act="print">'+o.print+'</button></div>';
    LASTTEXT='Rihla\n'+txt.join('\n');
    var out=$('out'); out.innerHTML=html; out.classList.add('show');
    redrawMaps();
    out.scrollIntoView({behavior:'smooth',block:'start'});
  }
  $('planBtn').addEventListener('click',plan);

  function toast(msg){var el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){el.classList.remove('show');},1800);}
  $('out').addEventListener('click',function(e){
    var b=e.target.closest('.act'); if(!b)return;
    var act=b.dataset.act, o=I18N[LANG].out;
    if(act==='print'){window.print();return;}
    if(act==='share'&&navigator.share){navigator.share({title:'Rihla',text:LASTTEXT}).catch(function(){});return;}
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(LASTTEXT).then(function(){toast(o.copied);},function(){toast(o.copied);});}
    else{toast(o.copied);}
  });

  (function(){
    var cv=$('topo'),ctx=cv.getContext('2d');
    function inkColor(){return getComputedStyle(document.documentElement).getPropertyValue('--ink').trim()||'#211e17';}
    function draw(){
      var w=cv.clientWidth,h=cv.clientHeight,dpr=Math.min(2,window.devicePixelRatio||1);
      cv.width=w*dpr; cv.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.strokeStyle=inkColor(); ctx.globalAlpha=0.06; ctx.lineWidth=1;
      var centers=[[w*0.2,h*0.18],[w*0.85,h*0.42],[w*0.5,h*0.82]];
      for(var c=0;c<centers.length;c++){
        var cx=centers[c][0],cy=centers[c][1];
        for(var r=26;r<Math.max(w,h)*0.9;r+=26){
          ctx.beginPath();
          for(var a=0;a<=Math.PI*2+0.1;a+=0.18){
            var wob=Math.sin(a*3+c*1.7+r*0.02)*8+Math.cos(a*5+r*0.01)*5, rr=r+wob;
            var x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr*0.82;
            if(a===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
          }
          ctx.stroke();
        }
      }
      ctx.globalAlpha=1;
    }
    draw();
    var to; window.addEventListener('resize',function(){clearTimeout(to);to=setTimeout(function(){draw();redrawMaps();},150);});
    if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').addEventListener)window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){draw();redrawMaps();});
    new MutationObserver(function(){draw();redrawMaps();}).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
  })();

  applyLang('en');
</script>
