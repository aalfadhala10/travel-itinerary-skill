<body>
<style>
  :root{
    --paper:#e9e2cf; --paper2:#f2ecd9; --card:#fbf8ef;
    --ink:#211e17; --muted:#7d7562; --line:#d9cfb6;
    --teal:#0c4a41; --teal-soft:#0c4a4112;
    --amber:#c6842a; --amber-soft:#c6842a1f;
    --clay:#b0512f;
    --shadow:0 14px 34px rgba(40,32,20,.14);
    --ff-display:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --ff-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --ff-data:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#0a1310; --paper2:#0f1a15; --card:#14211c;
      --ink:#ece5d3; --muted:#93a096; --line:#243029;
      --teal:#45b8a1; --teal-soft:#45b8a11a;
      --amber:#e6a648; --amber-soft:#e6a64822;
      --clay:#d9694c; --shadow:0 16px 40px rgba(0,0,0,.5);
    }
  }
  :root[data-theme="light"]{
    --paper:#e9e2cf; --paper2:#f2ecd9; --card:#fbf8ef;
    --ink:#211e17; --muted:#7d7562; --line:#d9cfb6;
    --teal:#0c4a41; --teal-soft:#0c4a4112; --amber:#c6842a; --amber-soft:#c6842a1f;
    --clay:#b0512f; --shadow:0 14px 34px rgba(40,32,20,.14);
  }
  :root[data-theme="dark"]{
    --paper:#0a1310; --paper2:#0f1a15; --card:#14211c;
    --ink:#ece5d3; --muted:#93a096; --line:#243029;
    --teal:#45b8a1; --teal-soft:#45b8a11a; --amber:#e6a648; --amber-soft:#e6a64822;
    --clay:#d9694c; --shadow:0 16px 40px rgba(0,0,0,.5);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:var(--ff-body);color:var(--ink);line-height:1.5;background:var(--paper);min-height:100vh}
  #topo{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
  .wrap{max-width:680px;margin:0 auto;padding:20px 18px 64px;position:relative;z-index:1}

  .langbar{display:flex;justify-content:center;gap:6px;margin-bottom:8px}
  .lang{padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:13px;cursor:pointer;user-select:none;transition:all .15s}
  .lang.active{background:var(--ink);border-color:var(--ink);color:var(--paper);font-weight:600}

  .hero{text-align:center;padding:6px 4px 2px}
  .compass{width:60px;height:60px;margin:0 auto 6px;border-radius:50%;border:2px solid var(--teal);position:relative;background:var(--card);box-shadow:var(--shadow)}
  .compass::before{content:"";position:absolute;inset:0;margin:auto;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:22px solid var(--amber);transform:translateY(-3px) rotate(38deg);transform-origin:50% 70%;animation:settle 1.5s cubic-bezier(.2,.85,.25,1) 1}
  @keyframes settle{0%{transform:translateY(-3px) rotate(230deg)}60%{transform:translateY(-3px) rotate(20deg)}100%{transform:translateY(-3px) rotate(38deg)}}
  @media (prefers-reduced-motion:reduce){.compass::before{animation:none}}
  .compass::after{content:"";position:absolute;inset:0;margin:auto;width:6px;height:6px;border-radius:50%;background:var(--teal)}
  h1{font-family:var(--ff-display);font-size:40px;margin:2px 0 0;letter-spacing:normal;font-weight:600}
  .tag{color:var(--muted);font-size:15px;max-width:420px;margin:6px auto 0;text-wrap:balance}
  .eyebrow{font-family:var(--ff-data);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--amber);font-weight:600}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:20px;margin-top:22px;position:relative}
  .card::before{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:44px;height:6px;border-radius:0 0 8px 8px;background:var(--paper);border:1px solid var(--line);border-top:none}
  label{display:block;font-family:var(--ff-data);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 7px;font-weight:600}
  label:first-of-type{margin-top:0}
  .hint{text-transform:none;letter-spacing:0;font-weight:400}
  input,select{width:100%;padding:14px;border-radius:11px;border:1px solid var(--line);background:var(--paper2);color:var(--ink);font-size:16px;font-family:var(--ff-body);outline:none;transition:border-color .15s}
  input:focus,select:focus{border-color:var(--teal)}
  .combo{position:relative;margin-top:10px}
  .combo input{padding-right:42px}
  #app[dir="rtl"] .combo input{padding-right:14px;padding-left:42px}
  .comboclear{position:absolute;top:50%;transform:translateY(-50%);right:10px;z-index:9;width:26px;height:26px;border-radius:50%;border:none;background:var(--line);color:var(--ink);font-size:12px;line-height:1;cursor:pointer;padding:0}
  .comboclear:hover{background:var(--clay);color:#fff}
  #app[dir="rtl"] .comboclear{right:auto;left:10px}
  .combolist{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:8;max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:5px}
  .comboitem{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:9px;cursor:pointer}
  .comboitem:hover,.comboitem.active{background:var(--teal-soft)}
  .comboitem .cflag{font-size:19px;flex-shrink:0;line-height:1}
  .comboitem .ccity{font-size:15px;font-weight:600;color:var(--ink)}
  .comboitem .ccountry{color:var(--muted);font-size:13px;margin-left:auto}
  #app[dir="rtl"] .comboitem .ccountry{margin-left:0;margin-right:auto}
  .stepper{display:flex;align-items:stretch;gap:8px}
  .stepper input{flex:1;min-width:0;text-align:center}
  .stepbtn{flex:0 0 46px;border:1px solid var(--line);background:var(--paper2);color:var(--ink);border-radius:11px;font-size:22px;font-weight:600;cursor:pointer;font-family:var(--ff-body);line-height:1;transition:all .15s;user-select:none}
  .stepbtn:hover{border-color:var(--teal);background:var(--teal-soft)}
  .stepbtn:active{transform:translateY(1px)}
  .daypresets{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .daychip{flex:1;min-width:36px;padding:7px 4px;border-radius:9px;border:1px solid var(--line);background:var(--paper2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff-data);transition:all .15s;font-variant-numeric:tabular-nums}
  .daychip:hover{border-color:var(--teal)}
  .daychip.active{background:var(--teal);border-color:var(--teal);color:#fff}
  @media (prefers-color-scheme:dark){.daychip.active{color:#0a1310}}
  :root[data-theme="dark"] .daychip.active{color:#0a1310}
  :root[data-theme="light"] .daychip.active{color:#fff}
  .editfab{position:fixed;bottom:22px;right:18px;z-index:6;padding:12px 18px;border-radius:999px;border:none;background:var(--teal);color:#fff;font-size:14px;font-weight:700;font-family:var(--ff-body);box-shadow:var(--shadow);cursor:pointer;transition:filter .15s}
  .editfab:hover{filter:brightness(1.06)}
  @media (prefers-color-scheme:dark){.editfab{color:#0a1310}}
  :root[data-theme="dark"] .editfab{color:#0a1310}
  :root[data-theme="light"] .editfab{color:#fff}
  #app[dir="rtl"] .editfab{right:auto;left:18px}
  .surprise{display:inline-block;margin-top:9px;background:none;border:none;color:var(--amber);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff-body);text-decoration:underline;text-decoration-color:var(--amber);text-underline-offset:3px;padding:2px 0}
  .surprise:hover{filter:brightness(1.1)}
  .addcity{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:9px 15px;border-radius:999px;border:1px dashed var(--line);background:transparent;color:var(--teal);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--ff-body);transition:all .15s}
  .addcity:hover{border-color:var(--teal);background:var(--teal-soft)}
  .is-hidden{display:none!important}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
  .chip{padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--paper2);color:var(--muted);font-size:14px;cursor:pointer;user-select:none;transition:all .15s}
  .chip:hover{border-color:var(--teal)}
  .chip.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}
  @media (prefers-color-scheme:dark){.chip.active{color:#0a1310}}
  :root[data-theme="dark"] .chip.active{color:#0a1310}
  :root[data-theme="light"] .chip.active{color:#fff}

  .btn{width:100%;margin-top:22px;padding:16px;border:none;border-radius:12px;background:var(--amber);color:#231a0a;font-size:16px;font-weight:700;font-family:var(--ff-body);cursor:pointer;box-shadow:var(--shadow);letter-spacing:.3px;transition:transform .08s,filter .15s}
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:3px solid var(--teal);outline-offset:2px}

  .out{margin-top:28px;display:none}
  .out.show{display:block;animation:rise .45s ease}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.out.show{animation:none}}
  .ticket{background:var(--teal);color:#fdfaf1;border-radius:16px;padding:20px}
  .ticket .eyebrow{color:#e9d6a8}
  .ticket h2{font-family:var(--ff-display);font-size:25px;margin:4px 0 2px;font-weight:600;line-height:1.15}
  .ticket .sub{opacity:.85;font-size:14px}
  .ticket .blurb{font-size:13.5px;opacity:.92;margin-top:10px;font-style:italic;text-wrap:balance}
  .ticket .season{display:inline-block;margin-top:11px;font-size:12.5px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);padding:5px 11px;border-radius:999px;font-variant-numeric:tabular-nums}
  .ticket a{color:#fff;text-decoration:underline;text-decoration-color:#e9d6a8;text-underline-offset:2px}
  .stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  .stat{flex:1;min-width:120px;background:rgba(255,255,255,.1);border-radius:10px;padding:11px 13px}
  .stat .k{font-family:var(--ff-data);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;opacity:.75}
  .stat .v{font-size:15px;font-weight:700;margin-top:3px}
  .stat .v.num{font-variant-numeric:tabular-nums}
  .realtag{font-family:var(--ff-data);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 2px 4px;text-align:center}

  .route{margin-top:6px;padding-left:4px}
  .day{position:relative;padding:18px 0 4px 26px;margin-left:8px;border-left:2px solid var(--line)}
  .day:last-child{border-left-color:transparent}
  .day::before{content:"";position:absolute;left:-7px;top:22px;width:12px;height:12px;border-radius:50%;background:var(--amber);border:2px solid var(--card)}
  .day .dlabel{font-family:var(--ff-data);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);font-weight:600}
  .day h3{font-family:var(--ff-display);margin:1px 0 10px;font-size:19px;font-weight:600}
  .slot{display:flex;gap:11px;padding:8px 0;border-top:1px dashed var(--line)}
  .slot:first-of-type{border-top:none}
  .slot .ico{font-size:18px;width:24px;text-align:center;flex-shrink:0}
  .slot .t{font-family:var(--ff-data);font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);width:64px;flex-shrink:0;padding-top:3px}
  .slot .d{font-size:15px}
  .slot .d a{color:inherit;text-decoration:underline;text-decoration-color:var(--amber);text-underline-offset:3px}
  .slot .area{color:var(--muted);font-size:12.5px}
  .note{color:var(--muted);font-size:12.5px;text-align:center;margin-top:22px;padding:0 8px;text-wrap:balance}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:34px;line-height:1.6}
  .foot b{color:var(--ink)}

  .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .act{flex:1;min-width:92px;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--ff-body);transition:all .15s;text-align:center;text-decoration:none}
  .act:hover{border-color:var(--teal)}
  .act:active{transform:translateY(1px)}

  .themebtn{position:absolute;top:20px;right:18px;z-index:2;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--ff-body);transition:all .15s}
  .themebtn:hover{border-color:var(--teal);color:var(--ink)}
  #app[dir="rtl"] .themebtn{right:auto;left:18px}

  .profilebtn{position:absolute;top:20px;left:18px;z-index:2;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--ff-body);transition:all .15s}
  .profilebtn:hover{border-color:var(--teal);color:var(--ink)}
  #app[dir="rtl"] .profilebtn{left:auto;right:18px}
  .greet{color:var(--teal);font-size:14px;font-weight:700;margin:9px 0 0}

  .welcome{position:fixed;inset:0;z-index:20;background:rgba(18,14,8,.55);display:flex;align-items:center;justify-content:center;padding:22px;opacity:0;pointer-events:none;transition:opacity .25s}
  .welcome.show{opacity:1;pointer-events:auto}
  .welcard{position:relative;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);max-width:400px;width:100%;padding:28px 24px;text-align:center;transform:translateY(10px);transition:transform .25s}
  .welclose{position:absolute;top:12px;right:14px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--paper2);color:var(--muted);font-size:15px;line-height:1;cursor:pointer;font-family:var(--ff-body);transition:all .15s}
  .welclose:hover{border-color:var(--clay);color:var(--clay)}
  #app[dir="rtl"] .welclose{right:auto;left:14px}
  .welremove{display:inline-block;margin-top:6px;background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;text-underline-offset:3px;cursor:pointer;font-family:var(--ff-body)}
  .welremove:hover{color:var(--clay)}
  .welcome.show .welcard{transform:none}
  .welcard .compass{margin:0 auto 8px}
  .welcard h2{font-family:var(--ff-display);font-size:26px;margin:6px 0 4px;font-weight:600}
  .welcard .wsub{color:var(--muted);font-size:14px;margin:0 auto 18px;max-width:300px;text-wrap:balance}
  .welbtn{width:100%;padding:15px;border:none;border-radius:12px;background:var(--amber);color:#231a0a;font-size:16px;font-weight:700;font-family:var(--ff-body);cursor:pointer;box-shadow:var(--shadow);transition:filter .15s}
  .welbtn:hover{filter:brightness(1.05)}
  .welbtn:active{transform:translateY(1px)}
  .weldiv{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;margin:16px 0;font-family:var(--ff-data);letter-spacing:1.5px;text-transform:uppercase}
  .weldiv::before,.weldiv::after{content:"";flex:1;height:1px;background:var(--line)}
  #app[dir="rtl"] .weldiv{letter-spacing:normal;font-family:var(--ff-body)}
  .welname{width:100%;padding:13px;border-radius:11px;border:1px solid var(--line);background:var(--paper2);color:var(--ink);font-size:16px;font-family:var(--ff-body);outline:none;margin-bottom:10px}
  .welname:focus{border-color:var(--teal)}
  .welsave{width:100%;padding:13px;border:1px solid var(--teal);border-radius:12px;background:var(--teal-soft);color:var(--teal);font-size:15px;font-weight:700;font-family:var(--ff-body);cursor:pointer;transition:all .15s}
  .welsave:hover{filter:brightness(1.05)}
  .welsave:active{transform:translateY(1px)}
  .welnote{color:var(--muted);font-size:11px;margin-top:14px}

  .mytrips{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:14px 16px;margin-top:16px}
  .triptags{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .triptag{display:inline-flex;align-items:center;gap:9px;padding:8px 13px;border-radius:999px;border:1px solid var(--line);background:var(--paper2);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
  .triptag:hover{border-color:var(--teal);background:var(--teal-soft)}
  .triptag .tx{color:var(--muted);font-weight:700;font-size:16px;line-height:1;padding:0 1px}
  .triptag .tx:hover{color:var(--clay)}
  .bud{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;margin-top:16px}
  .bud h4{font-family:var(--ff-display);font-size:17px;margin:0 0 10px;font-weight:600}
  .budrow{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-top:1px dashed var(--line);font-size:14px}
  .budrow:first-of-type{border-top:none}
  .budrow .amt{font-variant-numeric:tabular-nums;color:var(--muted)}
  .budrow.total{border-top:2px solid var(--line);margin-top:4px;font-weight:700}
  .budrow.total .amt{color:var(--ink)}
  .budnote{font-size:11.5px;color:var(--muted);margin-top:8px}
  .transfer{background:var(--paper2);border:1px dashed var(--clay);border-radius:12px;padding:12px 14px;margin:14px 0 4px}
  .transfer .tlabel{font-family:var(--ff-data);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--clay);font-weight:600}
  .transfer .tbody{font-size:14px;margin-top:3px}
  .mapcard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-top:16px}
  .maphdr{font-family:var(--ff-data);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  #app[dir="rtl"] .maphdr{letter-spacing:normal;font-family:var(--ff-body)}
  .mapcv{width:100%;height:150px;display:block;border-radius:10px;background:var(--paper2)}
  .mapbtn{display:block;text-align:center;margin-top:12px;padding:12px;border-radius:11px;background:var(--teal);color:#fff;font-weight:700;text-decoration:none;font-size:14px;transition:filter .15s}
  @media(prefers-color-scheme:dark){.mapbtn{color:#0a1310}}
  :root[data-theme="dark"] .mapbtn{color:#0a1310}
  :root[data-theme="light"] .mapbtn{color:#fff}
  .mapbtn:hover{filter:brightness(1.06)}

  /* searchable destination picker — alphabetical by country, type to filter */
  function byCountryCity(a,b){
    var ca=a.d.country.toLowerCase(), cb=b.d.country.toLowerCase();
    if(ca!==cb) return ca<cb?-1:1;
    var xa=a.d.city.toLowerCase(), xb=b.d.city.toLowerCase();
    return xa<xb?-1:xa>xb?1:0;
  }
  function destOptions(query){
    var s=(query||'').toLowerCase().trim();
    var arr=Object.keys(DEST).map(function(k){return {k:k,d:DEST[k]};});
    if(!s){ arr.sort(byCountryCity); return arr; }
    // rank: city starts-with (0) → country starts-with (1) → alias starts-with (2) → any contains (3)
    arr=arr.map(function(x){
      var city=x.d.city.toLowerCase(), country=x.d.country.toLowerCase(), sc=99;
      if(city.indexOf(s)===0) sc=0;
      else if(country.indexOf(s)===0) sc=1;
      else if(x.d.alias.some(function(a){return a.indexOf(s)===0;})) sc=2;
      else if(city.indexOf(s)>=0||country.indexOf(s)>=0||x.d.alias.some(function(a){return a.indexOf(s)>=0;})) sc=3;
      x._sc=sc; return x;
    }).filter(function(x){return x._sc<99;});
    arr.sort(function(a,b){ return a._sc!==b._sc ? a._sc-b._sc : byCountryCity(a,b); });
    return arr;
  }
  function renderComboList(list, query){

    if(!items.length){ list.innerHTML=''; list.classList.add('is-hidden'); return; }
    list.innerHTML=items.map(function(x){
      return '<div class="comboitem" data-k="'+x.k+'"><span class="cflag">'+x.d.flag+'</span><span class="ccity">'+esc(x.d.city)+'</span><span class="ccountry">'+esc(x.d.country)+'</span></div>';
    }).join('');
    list.classList.remove('is-hidden');
  }
  function makeCombo(inputId, listId, onPick){
    var inp=$(inputId), list=$(listId), active=-1;
    var clr=document.querySelector('[data-clear="'+inputId+'"]');
    function its(){ return [].slice.call(list.querySelectorAll('.comboitem')); }
    function toggleClear(){ if(clr) clr.classList.toggle('is-hidden', !inp.value); }
    function setActive(i){ var a=its(); active=i; a.forEach(function(el,idx){el.classList.toggle('active',idx===active);}); if(a[active])a[active].scrollIntoView({block:'nearest'}); }
    function open(){ renderComboList(list, inp.value); active=-1; inp.setAttribute('aria-expanded','true'); toggleClear(); }
    function close(){ list.classList.add('is-hidden'); inp.setAttribute('aria-expanded','false'); active=-1; }
    function pick(it){ var k=it.getAttribute('data-k'); inp.value=DEST[k].city; toggleClear(); close(); if(onPick)onPick(k,inp); }
    inp.addEventListener('focus', open);
    inp.addEventListener('input', open);
    inp.addEventListener('keydown', function(e){
      var a=its();
      if(e.key==='ArrowDown'){ e.preventDefault(); if(list.classList.contains('is-hidden'))open(); setActive(Math.min((active<0?-1:active)+1, a.length-1)); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); if(active>0)setActive(active-1); }
      else if(e.key==='Enter'){ if(active>=0&&a[active]){ e.preventDefault(); pick(a[active]); } else { close(); inp.blur(); } }
      else if(e.key==='Escape'){ close(); }
    });
    inp.addEventListener('blur', function(){ setTimeout(close, 160); });
    list.addEventListener('mousedown', function(e){ var it=e.target.closest('.comboitem'); if(!it)return; e.preventDefault(); pick(it); });
    if(clr){ clr.addEventListener('mousedown', function(e){ e.preventDefault(); inp.value=''; toggleClear(); open(); inp.focus(); }); }
  }

  function keyOf(d){var ks=Object.keys(DEST);for(var i=0;i<ks.length;i++)if(DEST[ks[i]]===d)return ks[i];return null;}

  function matchDest(input){
    var s=(input||'').toLowerCase().trim(); if(!s)return null;
    var keys=Object.keys(DEST), i, j, al, a;
    // 1) exact alias match wins — lets short aliases like "uk"/"uae" work only when typed exactly
    for(i=0;i<keys.length;i++){ al=DEST[keys[i]].alias; for(j=0;j<al.length;j++){ if(s===al[j]) return DEST[keys[i]]; } }
    // 2) prefix or whole-word contains — only for aliases 4+ chars, so "uk" can't match inside "phuket"
    for(i=0;i<keys.length;i++){ al=DEST[keys[i]].alias; for(j=0;j<al.length;j++){ a=al[j];
      if(a.length<4) continue;
      if(s.length>=2 && a.indexOf(s)===0) return DEST[keys[i]];   // alias starts with typed text (paris <- par)
      if(s.length>=4 && s.indexOf(a)>=0) return DEST[keys[i]];    // typed text contains a full alias word
    } }
    return null;
  }

    if(!val)return null;
    var s=new Date(val+'T00:00:00'); if(isNaN(s.getTime()))return null;
    var e=new Date(s.getTime()); e.setDate(e.getDate()+Math.max(0,days-1));
    var loc=t.loc, sM=s.toLocaleDateString(loc,{month:'short'}), eM=e.toLocaleDateString(loc,{month:'short'});
    var range=(s.getMonth()===e.getMonth())?(sM+' '+s.getDate()+'–'+e.getDate()+', '+e.getFullYear()):(sM+' '+s.getDate()+' – '+eM+' '+e.getDate()+', '+e.getFullYear());
    var today=new Date(); today.setHours(0,0,0,0);

  function icsFor(title,desc,startVal,days){

    function z(n){return (n<10?'0':'')+n;}
    function fmt(d){return ''+d.getFullYear()+z(d.getMonth()+1)+z(d.getDate());}

    return ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Bosla//Trip//EN','CALSCALE:GREGORIAN','BEGIN:VEVENT',
      'UID:bosla-'+fmt(s)+'-'+slug(title)+'@bosla','DTSTAMP:'+fmt(s)+'T000000Z',
      'DTSTART;VALUE=DATE:'+fmt(s),'DTEND;VALUE=DATE:'+fmt(e),
      'SUMMARY:'+ex(title),'DESCRIPTION:'+ex(desc),'TRANSP:TRANSPARENT',

  function emitDays(match,fromDay,count,total,vibes,spd,o,t,txt,stops){

      txt.push(''); txt.push(o.dayWord+' '+d+' — '+title+' ('+match.city+')');

  function drawMiniMap(cv,n){
    var w=cv.clientWidth||300,h=150,dpr=Math.min(2,window.devicePixelRatio||1),ctx=cv.getContext('2d');
    cv.width=w*dpr; cv.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
    var teal=cssVar('--teal'),amber=cssVar('--amber'),ink=cssVar('--ink'),card=cssVar('--card');
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle=ink; ctx.globalAlpha=0.05; ctx.lineWidth=1;
    for(var r=18;r<170;r+=22){ctx.beginPath();ctx.arc(w*0.5,h*0.5,r,0,Math.PI*2);ctx.stroke();}
    ctx.globalAlpha=1;
    var pad=28,pts=[];
    for(var i=0;i<n;i++){var x=pad+(n===1?(w-2*pad)/2:i*(w-2*pad)/(n-1));var y=h*0.5+Math.sin(i*0.9+0.6)*h*0.24;pts.push([x,y]);}
    ctx.strokeStyle=teal; ctx.globalAlpha=0.55; ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath(); pts.forEach(function(p,i){i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]);}); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;
    pts.forEach(function(p,i){
      ctx.beginPath(); ctx.arc(p[0],p[1],11,0,Math.PI*2); ctx.fillStyle=amber; ctx.fill();
      ctx.lineWidth=2; ctx.strokeStyle=card; ctx.stroke();
      ctx.fillStyle='#231a0a'; ctx.font='bold 11px ui-monospace,monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(i+1),p[0],p[1]);
    });
  }

  function hideWelcome(){ var w=$('welcome'); w.classList.remove('show'); w.setAttribute('aria-hidden','true'); }
  $('profileBtn').addEventListener('click',function(){ showWelcome('edit'); });
  $('guestBtn').addEventListener('click',function(){ markWelcomed(); hideWelcome(); });
  $('welClose').addEventListener('click',hideWelcome);
  $('welRemove').addEventListener('click',function(){ setName(''); applyProfile(); renderMyTrips(); hideWelcome(); });
  $('welSave').addEventListener('click',function(){
    setName(($('welName').value||'').trim().slice(0,24)); markWelcomed(); applyProfile(); renderMyTrips(); hideWelcome();
  });
  $('welName').addEventListener('keydown',function(e){ if(e.key==='Enter')$('welSave').click(); });
  $('welcome').addEventListener('click',function(e){ if(e.target===this){ markWelcomed(); hideWelcome(); } });
  function applyState(s){
    if(s.lang&&I18N[s.lang])applyLang(s.lang);
    $('dest').value=s.d||''; $('days').value=s.days||5; $('pace').value=s.pace||'balanced';
    $('adults').value=s.adults||2; $('kids').value=s.kids||0; $('startDate').value=s.sd||''; $('homeCur').value=s.cur||'USD';
    if(s.d2){ $('city2wrap').classList.remove('is-hidden'); $('addCity').classList.add('is-hidden'); $('dest2').value=s.d2; }
    if(s.budget)document.querySelectorAll('#budgetChips .chip').forEach(function(c){c.classList.toggle('active',c.dataset.v===s.budget);});
    if(s.vibes&&s.vibes.length)document.querySelectorAll('#vibeChips .chip').forEach(function(c){c.classList.toggle('active',s.vibes.indexOf(c.dataset.v)>=0);});
    if(s.d)plan();
  }

  function plan(){
    var t=I18N[LANG],o=t.out;
    var raw=($('dest').value||'').trim();
    if(!raw){ toast(o.pickFirst); try{$('dest').focus();}catch(e){} return; }
    var days=Math.max(1,Math.min(30,parseInt($('days').value,10)||5));
    var pace=$('pace').value, spd=pace==='relaxed'?2:pace==='packed'?4:3;
    var budget=picked('budgetChips')[0]||'Mid-range';
    var vibes=picked('vibeChips'); if(!vibes.length)vibes=['Culture'];
    var adults=Math.max(1,Math.min(20,parseInt($('adults').value,10)||1));
    var kids=Math.max(0,Math.min(20,parseInt($('kids').value,10)||0));
    HOME=$('homeCur').value||'USD';
    var di=formatDates($('startDate').value,days,t);
    var subVibes=vibes.map(function(v){return t.ui.vibes[v];}).join(' · ')+(di?' · '+di.range:'');
    var m1=matchDest(raw);
    var raw2=($('dest2').value||'').trim();
    var m2=raw2?matchDest(raw2):null;
    if(m2&&m2===m1)m2=null;
    var txt=[], html='', note='', paywallShown=false; MAPQ=[]; PRAYERQ=[];

    if(m1){
      var multi=!!(m2&&days>=2);
      var d1=multi?Math.ceil(days/2):days, d2=multi?days-d1:0;
      var base1=m1.cost[budget]*d1, base2=multi?m2.cost[budget]*d2:0;
      var tr=multi?transferInfo(t,m1,m2):null, trUSD=tr?tr.usd:0;
      var totalUSD=base1+base2+trUSD;
      var title=multi?(esc(m1.city)+' → '+esc(m2.city)+' · '+days+' '+o.daysUnit):(esc(m1.city)+', '+esc(m1.country)+' · '+days+' '+o.daysUnit);
      var stay=multi?(link(m1.hotels[budget],m1.hotels[budget]+' '+m1.city)+' / '+link(m2.hotels[budget],m2.hotels[budget]+' '+m2.city)):(link(m1.hotels[budget],m1.hotels[budget]+' '+m1.city)+' · <a href="'+bookUrl(m1.hotels[budget]+' '+m1.city)+'" target="_blank" rel="noopener">'+o.book+'</a>');
      var ml=di?di.monthLabel:null;
      var cd=di?(di.du>0?'<div class="season">'+o.countdown(di.du)+'</div> ':(di.du===0?'<div class="season">'+o.today+'</div> ':'')):'';
      var seasons=cd+'<div class="season">'+seasonLine(m1,t,ml)+'</div>'+(multi?' <div class="season">'+seasonLine(m2,t,ml)+'</div>':'');
      var stip=(o.seasonTip&&o.seasonTip[m1.summer.cond])?('<div class="tip">'+o.seasonTip[m1.summer.cond]+'</div>'):'';
      var blurb=multi?(esc(m1.city)+' ('+d1+' '+o.daysUnit+') → '+esc(m2.city)+' ('+d2+' '+o.daysUnit+')'):esc(m1.blurb[LANG]);

      txt.push(multi?(m1.city+' → '+m2.city+' · '+days+' '+o.daysUnit):(m1.city+', '+m1.country+' · '+days+' '+o.daysUnit));
      txt.push(t.ui.budgets[budget]+' · '+t.ui.paces[pace]+' · '+subVibes);

      html+='<div class="ticket"><div class="eyebrow">'+o.eyebrow+'</div>'+
        '<h2>'+title+'</h2>'+
        '<div class="sub">'+t.ui.budgets[budget]+' · '+t.ui.paces[pace]+' · '+subVibes+'</div>'+
        '<div class="blurb">'+blurb+'</div>'+seasons+stip+
        '<div class="stats">'+
          '<div class="stat"><div class="k">'+o.statLen+'</div><div class="v num">'+days+' '+o.daysUnit+'</div></div>'+
          '<div class="stat"><div class="k">'+o.statStay+'</div><div class="v">'+stay+'</div></div>'+
          '<div class="stat"><div class="k">'+o.statPer+'</div><div class="v num">'+money(t,totalUSD)+'</div></div>'+
        '</div></div>';

      var freeN=PRO?d1:Math.min(d1,Math.min(2,days));
      var stops1=[], route1=emitDays(m1,1,freeN,days,vibes,spd,o,t,txt,stops1);
      var mapHtml=mapCard(m1.city,stops1,t), route2='', transHtml='';
      if(PRO&&multi){
        transHtml='<div class="transfer"><div class="tlabel">'+o.cats.transfer+'</div><div class="tbody">'+tr.mode+' · '+esc(m1.city)+' → '+esc(m2.city)+' · '+tr.dur+' · '+money(t,tr.usd)+'</div></div>';
        txt.push(''); txt.push('» '+o.cats.transfer+': '+m1.city+' → '+m2.city+' ('+tr.dur+', ~$'+tr.usd+')');
        var stops2=[]; route2=emitDays(m2,d1+1,d2,days,vibes,spd,o,t,txt,stops2);
        mapHtml+=mapCard(m2.city,stops2,t);
      }
      html+=mapHtml;
      html+='<div class="realtag">'+o.realTag+'</div><div class="route">'+route1+transHtml+route2+'</div>';
      if(!PRO&&days>freeN){ html+=paywallCard(days,t); paywallShown=true; }
      html+=budgetCard(o,t,catRows(base1+base2),trUSD,totalUSD,multi?null:keyOf(m1),adults,kids);
      html+=packingCard(m1,vibes,t,m1.city);
      html+=goodToKnow(m1.country,t);
      html+=faithBar(m1.city,m1.country,t);
      html+=bookingBar(m1.city,t);
      txt.push(''); txt.push(o.budTotal+' ('+o.perPerson+'): ~$'+Math.round(totalUSD));
      note=o.note(esc(m1.city)+(multi?' & '+esc(m2.city):''));
    } else {
      var dest=raw||(LANG==='ar'?'وجهتك':LANG==='es'?'tu destino':'your destination');
      var gbase=GENCOST[budget]*days;
      txt.push(cap(dest)+' · '+days+' '+o.daysUnit); txt.push(t.ui.budgets[budget]+' · '+t.ui.paces[pace]+' · '+subVibes);
      html+='<div class="ticket"><div class="eyebrow">'+o.eyebrow+'</div>'+
        '<h2>'+esc(cap(dest))+' · '+days+' '+o.daysUnit+'</h2>'+
        '<div class="sub">'+t.ui.budgets[budget]+' · '+t.ui.paces[pace]+' · '+subVibes+'</div>'+
        '<div class="stats">'+
          '<div class="stat"><div class="k">'+o.statLen+'</div><div class="v num">'+days+' '+o.daysUnit+'</div></div>'+
          '<div class="stat"><div class="k">'+o.statStay+'</div><div class="v">'+t.hotels[budget]+'</div></div>'+
          '<div class="stat"><div class="k">'+o.statPer+'</div><div class="v num">'+money(t,gbase)+'</div></div>'+
        '</div></div><div class="route">';
      var gFree=PRO?days:Math.min(2,days);
      var tl2=timeLabels(o,spd);
      for(var d3=1;d3<=gFree;d3++){
        var tt=d3===1?o.arrival:d3===days?o.last:o.explore;
        html+='<div class="day"><div class="dlabel">'+o.dayWord+' '+d3+'</div><h3>'+tt+'</h3>';
        txt.push(''); txt.push(o.dayWord+' '+d3+' — '+tt);
        for(var s3=0;s3<spd;s3++){var vb=vibes[(d3+s3)%vibes.length];var act=pick(t.lib[vb],d3+s3);html+=slot('',tl2[s3],esc(act[1]));txt.push('  '+tl2[s3]+': '+act[1]);}
        html+=slot('',o.times.dinner,o.dinner_(pick(t.meals[budget],d3)));
        html+='</div>';
      }
      html+='</div>';
      if(!PRO&&days>gFree){ html+=paywallCard(days,t); paywallShown=true; }
      html+=budgetCard(o,t,catRows(gbase),0,gbase,null,adults,kids);
      html+=packingCard(null,vibes,t,cap(dest));
      html+=faithBar(cap(dest),'',t);
      html+=bookingBar(cap(dest),t);
      note='<span style="color:var(--clay)">'+o.notCurated(esc(cap(dest)))+'</span><br>'+o.note(esc(cap(dest)));
    }

    html+='<p class="note">'+note+'</p>';
    var acts='<div class="actions">'+
      '<button class="act" type="button" data-act="save">'+o.save+'</button>'+
      '<button class="act" type="button" data-act="wa">'+o.waShare+'</button>'+
      '<button class="act" type="button" data-act="share">'+o.share+'</button>';
    if(di){
      var calTitle=(m1?(m1.city+(m1.country?', '+m1.country:'')):cap(dest||raw||'Trip'))+' — بوصلة';
      var calDesc=t.ui.budgets[budget]+' · '+t.ui.paces[pace]+(subVibes?' · '+subVibes:'');
      var ics=icsFor(calTitle,calDesc,$('startDate').value,days);
      if(ics){ acts+='<a class="act" download="'+slug(m1?m1.city:cap(dest||raw||'trip'))+'-bosla.ics" href="data:text/calendar;charset=utf-8,'+encodeURIComponent(ics)+'">'+o.addCal+'</a>'; }
    }
    if(PRO){ acts+='<button class="act" type="button" data-act="copy">'+o.copy+'</button><button class="act" type="button" data-act="print">'+o.print+'</button>'; }
    else if(!paywallShown){ acts+='<button class="act" type="button" data-act="unlock">'+o.unlockCta+'</button>'; }
    html+=acts+'</div>';
    LASTTEXT='بوصلة · Bosla\n'+txt.join('\n');
    var out=$('out'); out.innerHTML=html; out.classList.add('show'); $('editFab').classList.remove('is-hidden');
    redrawMaps(); runPrayers(); saveState();
    out.scrollIntoView({behavior:'smooth',block:'start'});
  }
  $('planBtn').addEventListener('click',plan);

  function toast(msg){var el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){el.classList.remove('show');},1800);}
  $('out').addEventListener('click',function(e){
    var b=e.target.closest('[data-act]'); if(!b)return;
    var act=b.dataset.act, o=I18N[LANG].out;
    if(act==='unlock'){ try{localStorage.setItem('rihla_pro','1');}catch(e){} PRO=true; toast(o.unlocked); plan(); return; }
    if(act==='save'){ saveTrip(); toast(o.saved); return; }
    if(act==='wa'){ window.open('https://wa.me/?text='+encodeURIComponent(o.waMsg+' '+buildTripLink()),'_blank'); return; }
    if(act==='print'){window.print();return;}
    if(act==='share'){
      var link=buildTripLink();
      if(navigator.share){navigator.share({title:'Rihla',text:'My Rihla trip',url:link}).catch(function(){});return;}
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(link).then(function(){toast(o.linkCopied);},function(){toast(o.linkCopied);});}
      else{toast(o.linkCopied);}
      return;
    }
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(LASTTEXT).then(function(){toast(o.copied);},function(){toast(o.copied);});}
    else{toast(o.copied);}
  });
  // collapse / expand itinerary sections by tapping their header
  $('out').addEventListener('click',function(e){
    var hd=e.target.closest('.bud>h4,.pack>h4,.bookbar>.maphdr,.mapcard>.maphdr');
    if(!hd)return; hd.parentElement.classList.toggle('collapsed');
  });
  // interactive packing checklist — tap an item to tick it, saved per destination
  $('out').addEventListener('click',function(e){
    if(e.target.closest('a')||e.target.closest('[data-act]'))return;
    var li=e.target.closest('.pki'); if(!li)return;
    var pack=li.closest('.pack'); if(!pack)return;
    li.classList.toggle('done');
    var idxs=[].slice.call(pack.querySelectorAll('.pki.done')).map(function(x){return parseInt(x.getAttribute('data-pk'),10);});
    try{localStorage.setItem('rihla_pack_'+pack.getAttribute('data-pkkey'),JSON.stringify(idxs));}catch(err){}
    var prog=pack.querySelector('.pkprog'); if(prog)prog.textContent=idxs.length+'/'+pack.querySelectorAll('.pki').length;
  });

  (function(){
    var cv=$('topo'),ctx=cv.getContext('2d');
    function inkColor(){return getComputedStyle(document.documentElement).getPropertyValue('--ink').trim()||'#211e17';}
    function draw(){
      var w=cv.clientWidth,h=cv.clientHeight,dpr=Math.min(2,window.devicePixelRatio||1);
      cv.width=w*dpr; cv.height=h*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.strokeStyle=inkColor(); ctx.globalAlpha=0.06; ctx.lineWidth=1;
      var centers=[[w*0.2,h*0.18],[w*0.85,h*0.42],[w*0.5,h*0.82]];
      for(var c=0;c<centers.length;c++){
        var cx=centers[c][0],cy=centers[c][1];
        for(var r=26;r<Math.max(w,h)*0.9;r+=26){
          ctx.beginPath();
          for(var a=0;a<=Math.PI*2+0.1;a+=0.18){
            var wob=Math.sin(a*3+c*1.7+r*0.02)*8+Math.cos(a*5+r*0.01)*5, rr=r+wob;
            var x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr*0.82;
            if(a===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
          }
          ctx.stroke();
        }
      }
      ctx.globalAlpha=1;
    }
    draw();
    var to; window.addEventListener('resize',function(){clearTimeout(to);to=setTimeout(function(){draw();redrawMaps();},150);});
    if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').addEventListener)window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){draw();redrawMaps();});
    new MutationObserver(function(){draw();redrawMaps();}).observe(document.documentElement,{attributes:true,attributeFilter:['data-theme']});
  })();

  // restore saved theme preference before first render
  (function(){ try{ var th=localStorage.getItem('rihla_theme'); if(th==='dark'||th==='light')document.documentElement.setAttribute('data-theme',th); }catch(e){} })();

  applyLang('en');

  // restore from a shared trip link, else the last saved trip
  (function(){
    try{
      var s=null, h=location.hash||'';
      if(h.indexOf('#trip=')===0){ s=JSON.parse(decodeURIComponent(h.slice(6))); }
      if(!s){ s=JSON.parse(localStorage.getItem('rihla_v1')||'null'); }
      if(s){ applyState(s); }
      else { var lg=(navigator.language||navigator.userLanguage||'en').slice(0,2).toLowerCase(); if(lg==='ar')applyLang('ar'); else if(lg==='es')applyLang('es'); }
    }catch(e){}
  })();

  // first-time welcome (skipped when opening a shared trip link)
  (function(){ try{ if(!isWelcomed() && (location.hash||'').indexOf('#trip=')!==0){ showWelcome(); } }catch(e){} })();

  if('serviceWorker' in navigator){ window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
</script>
